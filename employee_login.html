<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login — Employee Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="auth-page">
        <section class="auth-card">
            <h1>Employee Login</h1>
            <p>Enter your employee credentials to access your dashboard.</p>
            <form id="employeeForm" class="login-form" action="employee_login.php" method="post">
                <input type="hidden" name="login_type" value="employee">
                <div class="form-group">
                    <label for="employee-email">Email</label>
                    <input id="employee-email" name="email" type="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="employee-password">Password</label>
                    <input id="employee-password" name="password" type="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Sign In</button>
            </form>
            <p>Don't have an account? <a href="employee_signup.html">Sign up</a></p>
            <p id="error" style="color:red;"></p>

</body>
</html>
