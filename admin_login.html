
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Employee Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    
    <main class="auth-page">
        <section class="auth-card">
            <h1>Admin Login</h1>
            <p>Enter your administrator credentials to access the dashboard.</p>
            <form id="adminForm" class="login-form" action="admin_login.php" method="post">
                <input type="hidden" name="login_type" value="admin">
                <div class="form-group">
                    <label for="admin-email">Email</label>
                    <input id="admin-email" name="email" type="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <input id="admin-password" name="password" type="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Sign In</button>
            </form>


            
<p id="error" style="color:red;"></p>

</body>
</html>
