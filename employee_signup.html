<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Sign Up — Employee Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="auth-page">
        <section class="auth-card">
            <h1>Employee Sign Up</h1>
            <p>Create your employee account to get started.</p>
            <form id="signupForm" class="login-form" action="employee_signup.php" method="post">
                <div class="form-group">
                    <label for="full-name">Full Name</label>
                    <input id="full-name" name="name" type="text" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="age">Age</label>
                    <input id="age" name="age" type="number" placeholder="25" required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="role">Role</label>
                    <input id="role" name="role" type="text" placeholder="Worker" required>
                </div>
                <div class="form-group">
                    <label for="birthday">Birthday</label>
                    <input id="birthday" name="birthday" type="date" required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input id="address" name="address" type="text" placeholder="123 Main St, City, Country" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input id="signup-email" name="email" type="email" placeholder="employee@example.com" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input id="signup-password" name="password" type="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input id="confirm-password" name="confirm_password" type="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Sign Up</button>
            </form>
            <p>Already have an account? <a href="employee_login.html">Sign In</a></p>
            <p id="error" style="color:red;"></p>
        </section>
    </main>

</body>
</html>
